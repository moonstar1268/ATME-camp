<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AFE 캠프 산출물 관리 시스템 | 임시 포털</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="portal-page" data-page="portal" data-role="admin">
    <main class="portal-shell">
      <section class="portal-main">
        <p class="panel-kicker">MVP PREVIEW</p>
        <h1>첫 페이지 이후 연결 상태를 확인하는 임시 화면입니다</h1>
        <p class="portal-lead">
          실제 역할별 대시보드는 다음 단계에서 구현할 예정이며, 현재는 첫 페이지
          입력값이 정상적으로 전달되는지만 확인할 수 있도록 구성했습니다.
        </p>

        <div class="portal-grid">
          <article class="summary-card">
            <h2>현재 선택된 진입 정보</h2>
            <div class="meta-list">
              <div class="meta-item">
                <span class="meta-label">선택 역할</span>
                <strong class="meta-value" data-role-name>관리자</strong>
              </div>
              <div class="meta-item">
                <span class="meta-label" data-identifier-label>입력값</span>
                <strong class="meta-value" data-identifier-value>없음</strong>
              </div>
            </div>
          </article>

          <article class="status-card">
            <h2 data-guidance-title>다음 구현 항목</h2>
            <ul data-guidance-list>
              <li>역할별 대시보드 구성</li>
            </ul>
          </article>
        </div>

        <a class="portal-button" href="./index.html">첫 페이지로 돌아가기</a>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
