{% extends "base.html" %}

{% block title %}AFE 캠프 산출물 관리 시스템{% endblock %}
{% block body_class %}landing-page{% endblock %}

{% block content %}
  <section class="login-wireframe-shell">
    <div class="login-wireframe-header">
      <p class="section-kicker">AFE CAMP</p>
      <h1>AFE 캠프 산출물 관리 시스템</h1>
    </div>

    {% if error %}
      <div class="flash flash-error">{{ error }}</div>
    {% endif %}

    <div class="tabs login-wireframe-tabs" data-tabs>
      <div class="role-switch login-wireframe-tablist" role="tablist" aria-label="로그인 역할 선택">
        <button class="tab-button {% if active_role == 'student' %}is-active{% endif %}" type="button" data-tab-target="student">학생</button>
        <button class="tab-button {% if active_role == 'teacher' %}is-active{% endif %}" type="button" data-tab-target="teacher">강사</button>
        <button class="tab-button {% if active_role == 'admin' %}is-active{% endif %}" type="button" data-tab-target="admin">관리자</button>
      </div>

      <div class="tab-panel login-wireframe-panel {% if active_role == 'student' %}is-active{% endif %}" data-tab-panel="student">
        <form action="/login/student" method="post" class="login-wireframe-form">
          <div class="login-wireframe-body">
            <label class="login-wireframe-row login-wireframe-row-single">
              <span>코드 명</span>
              <input
                type="text"
                name="program_code"
                placeholder="코드를 입력하세요 (ex. AFE26X9Q1K)"
                maxlength="12"
                autocomplete="off"
                required
              />
            </label>
          </div>
          <div class="login-wireframe-actions">
            <button type="submit" class="login-wireframe-submit">이동</button>
          </div>
        </form>
      </div>

      <div class="tab-panel login-wireframe-panel {% if active_role == 'teacher' %}is-active{% endif %}" data-tab-panel="teacher">
        <form action="/login/teacher" method="post" class="login-wireframe-form">
          <div class="login-wireframe-body">
            <label class="login-wireframe-row login-wireframe-row-single">
              <span>코드 명</span>
              <input
                type="text"
                name="access_code"
                placeholder="코드를 입력하세요 (ex. WVXXKX7K)"
                maxlength="12"
                autocomplete="off"
                required
              />
            </label>
          </div>
          <div class="login-wireframe-actions">
            <button type="submit" class="login-wireframe-submit">이동</button>
          </div>
        </form>
      </div>

      <div class="tab-panel login-wireframe-panel {% if active_role == 'admin' %}is-active{% endif %}" data-tab-panel="admin">
        <form action="/login/admin" method="post" class="login-wireframe-form">
          <div class="login-wireframe-body">
            <label class="login-wireframe-row">
              <span>ID</span>
              <input type="text" name="username" placeholder="ID를 입력하세요." autocomplete="username" required />
            </label>
            <label class="login-wireframe-row">
              <span>PW</span>
              <input type="password" name="password" placeholder="PW를 입력하세요." autocomplete="current-password" required />
            </label>
          </div>
          <div class="login-wireframe-actions">
            <button type="submit" class="login-wireframe-submit">이동</button>
          </div>
        </form>
      </div>
    </div>
  </section>
{% endblock %}
