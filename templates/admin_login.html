{% extends "base.html" %}

{% block title %}관리자 로그인 | AFE{% endblock %}
{% block body_class %}landing-page{% endblock %}

{% block content %}
  <section class="auth-shell">
    <article class="panel-card admin-login-card">
      <div class="panel-heading">
        <p class="eyebrow">ADMIN MODULE</p>
        <h1>관리자 운영 페이지</h1>
        <p>캠프 개설, 강사 관리, 결과물 관리, 프로그램 유형 관리는 관리자 전용 페이지에서 진행합니다.</p>
      </div>

      {% if error %}
        <div class="flash flash-error">{{ error }}</div>
      {% endif %}

      <form action="/login/admin" method="post" class="stack-form compact-top">
        <label>
          <span>관리자 ID</span>
          <input type="text" name="username" placeholder="관리자 ID" autocomplete="username" required />
        </label>
        <label>
          <span>비밀번호</span>
          <input type="password" name="password" placeholder="비밀번호" autocomplete="current-password" required />
        </label>
        <button type="submit" class="primary-button admin">관리자 대시보드로 이동</button>
      </form>

      <div class="admin-entry-note compact-top">
        <span>학생/강사 포털로 돌아가기</span>
        <a href="/" class="secondary-button">메인 포털</a>
      </div>
    </article>
  </section>
{% endblock %}
